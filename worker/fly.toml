# Deploy from the repo ROOT so the Docker context includes src/:
#   fly deploy . -c worker/fly.toml --dockerfile worker/Dockerfile
# Secret (set once): EDIT_WORKER_SECRET (same value as the web env). No Blob token —
# sources are public URLs and outputs use per-job upload grants from the web.
app = "spool-render"
primary_region = "syd"

[env]
  SPOOL_HOST = "https://spoolkit.dev"
  SPOOL_BLOB_BASE = "https://ipzxlhyhrfdty2vw.public.blob.vercel-storage.com"
  SPOOL_RENDER_CONCURRENCY = "4"

# Scale-to-zero worker: on a clean idle exit(0) the machine stops and stays stopped
# (on-failure only restarts crashes); the web wakes it via the Machines API on enqueue.
[[restart]]
  policy = "on-failure"
  retries = 5

# No [http_service]: a poller with no inbound traffic. Sized for fast renders
# (os.cpus()-based concurrency is pinned by SPOOL_RENDER_CONCURRENCY above).
[[vm]]
  size = "performance-4x"
  memory = "8gb"
